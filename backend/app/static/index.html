<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Quant Dashboard</title>
    <style>
      :root {
        --bg: #f3f5f2;
        --panel: #ffffff;
        --ink: #14181d;
        --muted: #64707d;
        --line: #dce2dc;
        --green: #087f5b;
        --red: #b42318;
        --blue: #2458d3;
        --amber: #a16207;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
      }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
      .brand { display: grid; gap: 3px; }
      .brand strong { font-size: 18px; }
      .brand span { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
      nav { display: flex; gap: 8px; flex-wrap: wrap; }
      button, select {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        padding: 9px 12px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
      }
      button.active, button.primary { background: var(--ink); border-color: var(--ink); color: white; }
      button:hover { border-color: var(--ink); }
      main { max-width: 1180px; margin: 0 auto; padding: 24px 18px 48px; }
      .hero {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
      }
      h1 { margin: 0; font-size: 30px; letter-spacing: 0; }
      h2 { margin: 0; font-size: 18px; }
      p { color: var(--muted); margin: 8px 0 0; }
      .grid { display: grid; gap: 12px; }
      .metrics { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 16px; }
      .metric, .card {
        background: var(--panel);
        border: 1px solid var(--line);
      }
      .metric { padding: 16px; }
      .metric label { display: block; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .metric b { display: block; margin-top: 6px; font-size: 25px; }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }
      .content { padding: 16px; }
      .two { grid-template-columns: 1.45fr 0.8fr; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        color: var(--muted);
        background: #f8faf7;
        text-align: left;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      th, td { padding: 12px 14px; border-top: 1px solid var(--line); white-space: nowrap; }
      tbody tr:hover { background: #fbfcfb; }
      .table-wrap { overflow-x: auto; }
      .pill {
        display: inline-flex;
        min-width: 72px;
        justify-content: center;
        padding: 5px 8px;
        border: 1px solid;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .buy { color: var(--green); background: #e9f7f1; border-color: #b8ead8; }
      .hold { color: var(--blue); background: #edf3ff; border-color: #c8d8ff; }
      .reduce { color: var(--amber); background: #fff8e6; border-color: #f3dea3; }
      .sell { color: var(--red); background: #fff0ef; border-color: #f5c6c3; }
      .good { color: var(--green); }
      .bad { color: var(--red); }
      .muted { color: var(--muted); }
      .warning {
        display: flex;
        gap: 10px;
        padding: 12px;
        border: 1px solid #f3dea3;
        background: #fff9eb;
        color: #6d4700;
        margin-bottom: 10px;
      }
      .manual-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .manual-block { padding: 16px; }
      .manual-block h3 { margin: 0 0 10px; font-size: 16px; }
      .manual-block ol, .manual-block ul {
        margin: 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      .manual-block li + li { margin-top: 7px; }
      .rule-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }
      .rule {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px;
        align-items: start;
        padding: 12px;
        border: 1px solid var(--line);
        background: #fbfcfb;
        font-size: 14px;
      }
      .rule b { font-size: 13px; }
      .tabs, .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .tabs button {
        padding: 8px 11px;
      }
      .filters {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfb;
      }
      .filters label {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .filters select {
        min-width: 160px;
        text-transform: none;
        letter-spacing: 0;
      }
      .rating {
        display: inline-flex;
        min-width: 142px;
        justify-content: center;
        padding: 5px 8px;
        border: 1px solid;
        font-size: 12px;
        font-weight: 700;
      }
      .strong { color: var(--green); background: #e9f7f1; border-color: #b8ead8; }
      .watch { color: var(--blue); background: #edf3ff; border-color: #c8d8ff; }
      .early { color: var(--amber); background: #fff8e6; border-color: #f3dea3; }
      .avoid { color: var(--red); background: #fff0ef; border-color: #f5c6c3; }
      .ticker-score {
        font-weight: 800;
      }
      .ticker-green { color: var(--green); }
      .ticker-blue { color: var(--blue); }
      .ticker-yellow { color: var(--amber); }
      .ticker-red { color: var(--red); }
      .ticker-gray { color: var(--muted); }
      .held-badge {
        display: inline-flex;
        margin-left: 7px;
        border: 1px solid var(--blue);
        background: #edf3ff;
        color: var(--blue);
        padding: 2px 6px;
        font-size: 11px;
        font-weight: 800;
      }
      .auth-panel {
        max-width: 520px;
        margin: 36px auto;
      }
      .auth-form {
        display: grid;
        gap: 10px;
        padding: 16px;
      }
      .auth-form input {
        border: 1px solid var(--line);
        padding: 10px 12px;
        font: inherit;
      }
      .trade-form {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
        gap: 10px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfb;
      }
      .trade-form label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .trade-form input {
        border: 1px solid var(--line);
        padding: 9px 12px;
        font: inherit;
        font-size: 14px;
      }
      .hidden { display: none; }
      .empty { padding: 20px; color: var(--muted); }

      @media (max-width: 820px) {
        .metrics, .two, .manual-grid, .trade-form { grid-template-columns: 1fr; }
        .hero { align-items: stretch; flex-direction: column; }
        h1 { font-size: 25px; }
        nav button { flex: 1 1 auto; }
        .rule { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div class="brand">
          <strong>Quant Foundry</strong>
          <span>AI Infrastructure Portfolio Engine</span>
        </div>
        <nav id="nav"></nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div>
          <h1>AI 基建量化仪表盘</h1>
          <p>跟踪持仓、目标权重、趋势信号和风险约束。</p>
        </div>
        <button class="primary" id="refreshBtn">刷新市场数据</button>
      </section>

      <section id="auth" class="page hidden"></section>
      <section id="dashboard" class="page"></section>
      <section id="portfolio" class="page hidden"></section>
      <section id="signals" class="page hidden"></section>
      <section id="risk" class="page hidden"></section>
      <section id="watchlist" class="page hidden"></section>
      <section id="virtual" class="page hidden"></section>
      <section id="manual" class="page hidden"></section>
    </main>

    <script>
      const pages = [
        ["dashboard", "Dashboard"],
        ["portfolio", "Portfolio"],
        ["signals", "Signals"],
        ["risk", "Risk"],
        ["watchlist", "Watchlist"],
        ["virtual", "虚拟盘"],
        ["manual", "使用手册"]
      ];
      const universe = ["QQQ", "NVDA", "AVGO", "TSM", "MU", "MRVL", "VRT", "ANET", "AMZN", "PLTR", "TSLA"];
      let active = "dashboard";
      let selectedTicker = "NVDA";
      let watchlistMode = "prices";
      let candidateFilters = { theme: "All", rating: "All", signal: "All", volatility: "All" };
      let virtualTickers = [];
      let virtualLookup = null;
      let authToken = localStorage.getItem("quant_auth_token") || "";
      let currentUser = null;
      let scoreMap = {};

      const fmtCurrency = (value) => value == null ? "--" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value);
      const fmtPct = (value) => value == null ? "--" : `${(value * 100).toFixed(1)}%`;
      const api = (path, options = {}) => {
        const headers = { ...(options.headers || {}) };
        if (authToken) headers.Authorization = `Bearer ${authToken}`;
        return fetch(path, { ...options, headers }).then(async (res) => {
        if (!res.ok) {
          let detail = `${path} ${res.status}`;
          try {
            const payload = await res.json();
            detail = payload.detail || detail;
          } catch {}
          if (res.status === 401) {
            authToken = "";
            currentUser = null;
            localStorage.removeItem("quant_auth_token");
            active = "auth";
          }
          throw new Error(detail);
        }
        return res.json();
        });
      };
      const signalPill = (signal) => `<span class="pill ${signal || "hold"}">${signal || "hold"}</span>`;
      const getTickerColor = (score) => {
        if (score === null || score === undefined) return "ticker-gray";
        if (score >= 5) return "ticker-green";
        if (score >= 3) return "ticker-blue";
        if (score >= 1) return "ticker-yellow";
        return "ticker-red";
      };
      const tickerLabel = (ticker, score = scoreMap[ticker], extra = "") => `<span class="ticker-score ${getTickerColor(score)}">${ticker}</span>${extra}`;
      const ratingClass = (rating) => {
        if (rating === "STRONG CANDIDATE") return "strong";
        if (rating === "WATCH CANDIDATE") return "watch";
        if (rating === "EARLY WATCH") return "early";
        return "avoid";
      };
      const ratingPill = (rating) => `<span class="rating ${ratingClass(rating)}">${rating}</span>`;

      function setActive(page) {
        if (page === "logout") {
          authToken = "";
          currentUser = null;
          scoreMap = {};
          localStorage.removeItem("quant_auth_token");
          renderNav();
          page = "auth";
        }
        if (!authToken && page !== "auth") page = "auth";
        active = page;
        document.querySelectorAll(".page").forEach((el) => el.classList.toggle("hidden", el.id !== page));
        document.querySelectorAll("nav button").forEach((btn) => btn.classList.toggle("active", btn.dataset.page === page));
        render();
      }

      function renderNav() {
        const authButton = authToken ? `<button data-page="logout">Logout</button>` : `<button data-page="auth">Login</button>`;
        document.getElementById("nav").innerHTML = `${pages.map(([id, label]) => `<button data-page="${id}">${label}</button>`).join("")}${authButton}`;
        document.querySelectorAll("nav button").forEach((btn) => btn.addEventListener("click", () => setActive(btn.dataset.page)));
        setActive(authToken ? active : "auth");
      }

      function rows(items, cols) {
        return items.map((item) => `<tr>${cols.map((col) => `<td>${col(item)}</td>`).join("")}</tr>`).join("");
      }

      async function loadScoreMap() {
        if (!authToken) return;
        try {
          const data = await api("/watchlist/potential");
          scoreMap = Object.fromEntries(data.potential_stocks.map((item) => [item.ticker, item.score]));
        } catch {
          scoreMap = {};
        }
      }

      function renderAuth(message = "") {
        document.getElementById("auth").innerHTML = `
          <div class="card auth-panel">
            <div class="section-head"><h2>登录 / 注册</h2><span class="muted">User-specific portfolio and virtual trades</span></div>
            <form class="auth-form" id="loginForm">
              <input id="loginIdentity" placeholder="username or email" />
              <input id="loginPassword" placeholder="password" type="password" />
              <button class="primary" type="submit">登录</button>
            </form>
            <form class="auth-form" id="registerForm" style="border-top:1px solid var(--line)">
              <input id="registerUsername" placeholder="username" />
              <input id="registerEmail" placeholder="email" />
              <input id="registerPassword" placeholder="password, min 6 chars" type="password" />
              <button type="submit">注册新用户</button>
            </form>
            <div class="${message.includes("失败") || message.includes("Invalid") ? "bad" : "muted"}" style="padding:0 16px 16px">${message}</div>
          </div>`;
        document.getElementById("loginForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          try {
            const result = await api("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                username_or_email: document.getElementById("loginIdentity").value,
                password: document.getElementById("loginPassword").value
              })
            });
            authToken = result.token;
            currentUser = result.user;
            localStorage.setItem("quant_auth_token", authToken);
            await loadScoreMap();
            renderNav();
            setActive("dashboard");
          } catch (error) {
            renderAuth(`登录失败：${error.message}`);
          }
        });
        document.getElementById("registerForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          try {
            const result = await api("/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                username: document.getElementById("registerUsername").value,
                email: document.getElementById("registerEmail").value,
                password: document.getElementById("registerPassword").value
              })
            });
            authToken = result.token;
            currentUser = result.user;
            localStorage.setItem("quant_auth_token", authToken);
            await loadScoreMap();
            renderNav();
            setActive("dashboard");
          } catch (error) {
            renderAuth(`注册失败：${error.message}`);
          }
        });
      }

      async function renderDashboard() {
        const data = await api("/report/daily");
        const counts = data.signal_counts || {};
        document.getElementById("dashboard").innerHTML = `
          <div class="grid metrics">
            <div class="metric"><label>Portfolio Value</label><b>${fmtCurrency(data.portfolio_value)}</b></div>
            <div class="metric"><label>Cash</label><b>${fmtCurrency(data.cash)}</b></div>
            <div class="metric"><label>AI Exposure</label><b>${fmtPct(data.risk_summary.ai_theme_exposure)}</b></div>
            <div class="metric"><label>Warnings</label><b class="${data.risk_warnings.length ? "bad" : "good"}">${data.risk_warnings.length}</b></div>
          </div>
          <div class="grid two">
            <div class="card">
              <div class="section-head"><h2>信号总览</h2><span class="muted">${data.data.latest_date || "无数据"}</span></div>
              <div class="table-wrap"><table>
                <thead><tr><th>Ticker</th><th>Price</th><th>6M Momentum</th><th>Signal</th></tr></thead>
                <tbody>${rows(data.top_signals, [
                  (x) => tickerLabel(x.ticker),
                  (x) => fmtCurrency(x.price),
                  (x) => fmtPct(x.momentum_6m),
                  (x) => signalPill(x.signal)
                ])}</tbody>
              </table></div>
            </div>
            <div class="card">
              <div class="section-head"><h2>今日脉冲</h2></div>
              <div class="content">
                ${["buy", "hold", "reduce", "sell"].map((key) => `<p style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:10px">${signalPill(key)} <b>${counts[key] || 0}</b></p>`).join("")}
              </div>
            </div>
          </div>`;
      }

      async function renderPortfolio() {
        const data = await api("/portfolio");
        document.getElementById("portfolio").innerHTML = `
          <div class="card">
            <div class="section-head"><h2>Portfolio</h2><span class="muted">Total ${fmtCurrency(data.total_value)}</span></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Ticker</th><th>Shares</th><th>Price</th><th>Value</th><th>Current</th><th>Target</th><th>Gap</th></tr></thead>
              <tbody>
                ${rows(data.holdings, [
                  (x) => tickerLabel(x.ticker),
                  (x) => x.shares,
                  (x) => fmtCurrency(x.price),
                  (x) => fmtCurrency(x.market_value),
                  (x) => fmtPct(x.current_weight),
                  (x) => fmtPct(x.target_weight),
                  (x) => `<span class="${x.weight_gap >= 0 ? "good" : "bad"}">${fmtPct(x.weight_gap)}</span>`
                ])}
                <tr><td><b>Cash</b></td><td>--</td><td>--</td><td>${fmtCurrency(data.cash)}</td><td>${fmtPct(data.cash / data.total_value)}</td><td>${fmtPct(data.target_weights.CASH)}</td><td>${fmtPct(data.target_weights.CASH - data.cash / data.total_value)}</td></tr>
              </tbody>
            </table></div>
          </div>`;
      }

      async function renderSignals() {
        const data = await api("/signals");
        document.getElementById("signals").innerHTML = `
          <div class="card">
            <div class="section-head"><h2>Signals</h2><span class="muted">MA20 / MA50 / MA200 + Momentum</span></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Ticker</th><th>Close</th><th>MA50</th><th>MA200</th><th>3M</th><th>6M</th><th>Vol</th><th>Signal</th></tr></thead>
              <tbody>${rows(data.signals, [
                (x) => tickerLabel(x.ticker),
                (x) => fmtCurrency(x.price),
                (x) => fmtCurrency(x.ma50),
                (x) => fmtCurrency(x.ma200),
                (x) => fmtPct(x.momentum_3m),
                (x) => fmtPct(x.momentum_6m),
                (x) => fmtPct(x.volatility),
                (x) => signalPill(x.signal)
              ])}</tbody>
            </table></div>
          </div>`;
      }

      async function renderRisk() {
        const data = await api("/risk");
        document.getElementById("risk").innerHTML = `
          <div class="grid metrics">
            <div class="metric"><label>Cash Weight</label><b>${fmtPct(data.summary.cash_weight)}</b></div>
            <div class="metric"><label>AI Exposure</label><b>${fmtPct(data.summary.ai_theme_exposure)}</b></div>
            <div class="metric"><label>High Beta</label><b>${fmtPct(data.summary.high_beta_exposure)}</b></div>
            <div class="metric"><label>Crypto</label><b>${fmtPct(data.summary.crypto_exposure)}</b></div>
          </div>
          <div class="card">
            <div class="section-head"><h2>Risk Warnings</h2></div>
            <div class="content">
              ${data.warnings.length ? data.warnings.map((x) => `<div class="warning">⚠ ${x.message}</div>`).join("") : `<div class="empty">当前没有风险告警。</div>`}
            </div>
          </div>`;
      }

      async function renderWatchlist() {
        if (watchlistMode === "potential") {
          await renderPotentialWatchlist();
          return;
        }

        const data = await api(`/prices/${selectedTicker}`);
        const last = data.prices[data.prices.length - 1];
        document.getElementById("watchlist").innerHTML = `
          <div class="card">
            <div class="section-head">
              <h2>Watchlist</h2>
              <div class="tabs">
                <button class="active" id="priceTab">Price History</button>
                <button id="potentialTab">Potential Stocks</button>
                <select id="tickerSelect">${universe.map((x) => `<option ${x === selectedTicker ? "selected" : ""}>${x}</option>`).join("")}</select>
              </div>
            </div>
            ${last ? `<div class="grid metrics" style="padding:16px;margin:0">
              <div class="metric"><label>Close</label><b>${fmtCurrency(last.close)}</b></div>
              <div class="metric"><label>MA20</label><b>${fmtCurrency(last.ma20)}</b></div>
              <div class="metric"><label>MA50</label><b>${fmtCurrency(last.ma50)}</b></div>
              <div class="metric"><label>6M Momentum</label><b>${fmtPct(last.momentum_6m)}</b></div>
            </div>` : `<div class="empty">暂无价格数据。</div>`}
            <div class="table-wrap"><table>
              <thead><tr><th>Date</th><th>Close</th><th>MA20</th><th>MA50</th><th>MA200</th><th>Vol</th></tr></thead>
              <tbody>${rows(data.prices.slice(-40).reverse(), [
                (x) => x.date,
                (x) => fmtCurrency(x.close),
                (x) => fmtCurrency(x.ma20),
                (x) => fmtCurrency(x.ma50),
                (x) => fmtCurrency(x.ma200),
                (x) => fmtPct(x.volatility)
              ])}</tbody>
            </table></div>
          </div>`;
        document.getElementById("tickerSelect").addEventListener("change", (event) => {
          selectedTicker = event.target.value;
          renderWatchlist();
        });
        document.getElementById("potentialTab").addEventListener("click", () => {
          watchlistMode = "potential";
          renderWatchlist();
        });
      }

      async function renderVirtualPortfolio(message = "") {
        const [data, health] = await Promise.all([api("/virtual-portfolio"), api("/health")]);
        virtualTickers = [...new Set([...(health.universe || []), ...(health.candidate_universe || [])])].sort();
        document.getElementById("virtual").innerHTML = `
          <div class="grid metrics">
            <div class="metric"><label>Total Value</label><b>${fmtCurrency(data.total_value)}</b></div>
            <div class="metric"><label>Cash</label><b>${fmtCurrency(data.cash)}</b></div>
            <div class="metric"><label>Market Value</label><b>${fmtCurrency(data.total_market_value)}</b></div>
            <div class="metric"><label>Total Return</label><b class="${data.total_return >= 0 ? "good" : "bad"}">${fmtCurrency(data.total_return)} (${fmtPct(data.total_return_pct)})</b></div>
          </div>

          <div class="card">
            <div class="section-head">
              <div>
                <h2>虚拟盘</h2>
                <p style="margin-top:4px">模拟交易账户，默认初始现金 $100,000。交易按当前最新价格成交，不连接真实券商。</p>
              </div>
            </div>
            <form class="trade-form" id="tradeForm">
              <label>Ticker
                <input id="tradeTicker" placeholder="e.g. NVDA" value="${virtualLookup?.ticker || ""}" />
              </label>
              <label>Side
                <select id="tradeSide">
                  <option value="buy">Buy</option>
                  <option value="sell">Sell</option>
                </select>
              </label>
              <label>Quantity
                <input id="tradeQuantity" type="number" min="0.0001" step="0.0001" value="1" />
              </label>
              <label>Price
                <input id="tradePrice" readonly value="${virtualLookup?.current_price ? fmtCurrency(virtualLookup.current_price) : ""}" />
              </label>
              <label>Notes
                <input id="tradeNotes" placeholder="optional" />
              </label>
              <label>Status
                <span id="tradeStatus" class="${message.includes("失败") || message.includes("Invalid") ? "bad" : "good"}" style="padding:10px 0">${message || (virtualLookup ? `${virtualLookup.company_name} · ${virtualLookup.signal || "n/a"} · score ${virtualLookup.score ?? "n/a"}` : "Type ticker to load price")}</span>
              </label>
              <button class="primary" type="submit">提交模拟交易</button>
            </form>

            <div class="table-wrap"><table>
              <thead><tr><th>Ticker</th><th>Shares</th><th>Avg Cost</th><th>Current</th><th>Market Value</th><th>Weight</th><th>Unrealized P&L</th></tr></thead>
              <tbody>${data.positions.length ? rows(data.positions, [
                (x) => tickerLabel(x.ticker),
                (x) => x.shares.toFixed(4),
                (x) => fmtCurrency(x.avg_cost),
                (x) => fmtCurrency(x.current_price),
                (x) => fmtCurrency(x.market_value),
                (x) => fmtPct(x.weight),
                (x) => `<span class="${x.unrealized_pnl >= 0 ? "good" : "bad"}">${fmtCurrency(x.unrealized_pnl)} (${fmtPct(x.unrealized_pnl_pct)})</span>`
              ]) : `<tr><td colspan="7" class="empty">还没有虚拟持仓。可以先买入 1 股候选股票试试。</td></tr>`}</tbody>
            </table></div>
          </div>

          <div class="card" style="margin-top:12px">
            <div class="section-head"><h2>最近模拟交易</h2></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Time</th><th>Ticker</th><th>Side</th><th>Quantity</th><th>Price</th><th>Notional</th><th>Notes</th></tr></thead>
              <tbody>${data.recent_trades.length ? rows(data.recent_trades, [
                (x) => x.created_at,
                (x) => tickerLabel(x.ticker),
                (x) => signalPill(x.side),
                (x) => Number(x.shares).toFixed(4),
                (x) => fmtCurrency(x.price),
                (x) => fmtCurrency(x.notional),
                (x) => x.notes || ""
              ]) : `<tr><td colspan="7" class="empty">暂无交易记录。</td></tr>`}</tbody>
            </table></div>
          </div>`;

        async function lookupTradeTicker() {
          const input = document.getElementById("tradeTicker");
          const ticker = input.value.trim().toUpperCase();
          input.value = ticker;
          if (!/^[A-Z0-9.-]+$/.test(ticker)) {
            virtualLookup = null;
            document.getElementById("tradePrice").value = "";
            document.getElementById("tradeStatus").textContent = "Invalid ticker or no market data found.";
            document.getElementById("tradeStatus").className = "bad";
            return null;
          }
          try {
            virtualLookup = await api(`/ticker/${ticker}/lookup`);
            scoreMap[ticker] = virtualLookup.score;
            document.getElementById("tradePrice").value = fmtCurrency(virtualLookup.current_price);
            document.getElementById("tradeStatus").textContent = `${virtualLookup.company_name} · ${virtualLookup.signal || "n/a"} · score ${virtualLookup.score ?? "n/a"}`;
            document.getElementById("tradeStatus").className = "good";
            return virtualLookup;
          } catch {
            virtualLookup = null;
            document.getElementById("tradePrice").value = "";
            document.getElementById("tradeStatus").textContent = "Invalid ticker or no market data found.";
            document.getElementById("tradeStatus").className = "bad";
            return null;
          }
        }
        document.getElementById("tradeTicker").addEventListener("change", lookupTradeTicker);
        document.getElementById("tradeTicker").addEventListener("blur", lookupTradeTicker);

        document.getElementById("tradeForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const lookup = await lookupTradeTicker();
          if (!lookup) return;
          const payload = {
            ticker: document.getElementById("tradeTicker").value.trim().toUpperCase(),
            side: document.getElementById("tradeSide").value,
            quantity: Number(document.getElementById("tradeQuantity").value),
            price: lookup.current_price,
            notes: document.getElementById("tradeNotes").value.trim()
          };
          try {
            await api("/virtual-portfolio/trade", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            await renderVirtualPortfolio(`已提交 ${payload.side.toUpperCase()} ${payload.quantity} ${payload.ticker}`);
          } catch (error) {
            await renderVirtualPortfolio(`交易失败：${error.message}`);
          }
        });
      }

      async function renderPotentialWatchlist() {
        const data = await api("/watchlist/potential");
        const themes = ["All", ...new Set(data.potential_stocks.map((x) => x.theme))];
        const ratings = ["All", "STRONG CANDIDATE", "WATCH CANDIDATE", "EARLY WATCH", "AVOID / WAIT"];
        const signals = ["All", ...new Set(data.potential_stocks.map((x) => x.signal))];
        const filtered = data.potential_stocks.filter((item) => {
          if (candidateFilters.theme !== "All" && item.theme !== candidateFilters.theme) return false;
          if (candidateFilters.rating !== "All" && item.candidate_rating !== candidateFilters.rating) return false;
          if (candidateFilters.signal !== "All" && item.signal !== candidateFilters.signal) return false;
          if (candidateFilters.volatility === "High only" && !(item.annualized_volatility > 0.60)) return false;
          if (candidateFilters.volatility === "Hide high" && item.annualized_volatility > 0.60) return false;
          return true;
        });

        document.getElementById("watchlist").innerHTML = `
          <div class="card">
            <div class="section-head">
              <div>
                <h2>Potential Stocks</h2>
                <p style="margin-top:4px">Candidate universe includes both held and non-held stocks. Held names are marked automatically.</p>
              </div>
              <div class="tabs">
                <button id="priceTab">Price History</button>
                <button class="active" id="potentialTab">Potential Stocks</button>
              </div>
            </div>
            <div class="filters">
              <label>Theme
                <select id="themeFilter">${themes.map((x) => `<option ${x === candidateFilters.theme ? "selected" : ""}>${x}</option>`).join("")}</select>
              </label>
              <label>Rating
                <select id="ratingFilter">${ratings.map((x) => `<option ${x === candidateFilters.rating ? "selected" : ""}>${x}</option>`).join("")}</select>
              </label>
              <label>Signal
                <select id="signalFilter">${signals.map((x) => `<option ${x === candidateFilters.signal ? "selected" : ""}>${x}</option>`).join("")}</select>
              </label>
              <label>Volatility
                <select id="volFilter">
                  ${["All", "High only", "Hide high"].map((x) => `<option ${x === candidateFilters.volatility ? "selected" : ""}>${x}</option>`).join("")}
                </select>
              </label>
            </div>
            <div class="content muted">
              Candidate universe includes held and non-held tickers. Held names are marked with a HELD badge.
            </div>
            <div class="table-wrap"><table>
              <thead><tr><th>Ticker</th><th>Company</th><th>Theme</th><th>Price</th><th>MA50</th><th>MA200</th><th>3M</th><th>6M</th><th>Vol</th><th>Signal</th><th>Score</th><th>Current</th><th>Target</th><th>Rating</th><th>Entry Zone</th><th>Action</th></tr></thead>
              <tbody>${filtered.length ? rows(filtered, [
                (x) => tickerLabel(x.ticker, x.score, x.is_current_holding ? `<span class="held-badge">HELD</span>` : ""),
                (x) => x.company_name,
                (x) => x.theme,
                (x) => fmtCurrency(x.current_price),
                (x) => fmtCurrency(x.ma50),
                (x) => fmtCurrency(x.ma200),
                (x) => fmtPct(x.momentum_3m),
                (x) => fmtPct(x.momentum_6m),
                (x) => `<span class="${x.annualized_volatility > 0.60 ? "bad" : ""}">${fmtPct(x.annualized_volatility)}</span>`,
                (x) => signalPill(x.signal),
                (x) => `<b>${x.score}</b>`,
                (x) => fmtPct(x.current_weight),
                (x) => fmtPct(x.target_weight),
                (x) => ratingPill(x.candidate_rating),
                (x) => x.entry_zone,
                (x) => x.suggested_action
              ]) : `<tr><td colspan="16" class="empty">No candidates match the selected filters.</td></tr>`}</tbody>
            </table></div>
          </div>`;

        document.getElementById("priceTab").addEventListener("click", () => {
          watchlistMode = "prices";
          renderWatchlist();
        });
        document.getElementById("themeFilter").addEventListener("change", (event) => {
          candidateFilters.theme = event.target.value;
          renderPotentialWatchlist();
        });
        document.getElementById("ratingFilter").addEventListener("change", (event) => {
          candidateFilters.rating = event.target.value;
          renderPotentialWatchlist();
        });
        document.getElementById("signalFilter").addEventListener("change", (event) => {
          candidateFilters.signal = event.target.value;
          renderPotentialWatchlist();
        });
        document.getElementById("volFilter").addEventListener("change", (event) => {
          candidateFilters.volatility = event.target.value;
          renderPotentialWatchlist();
        });
      }

      function renderManual() {
        document.getElementById("manual").innerHTML = `
          <div class="grid manual-grid">
            <div class="card manual-block">
              <h3>一、每天怎么用</h3>
              <ol>
                <li>先看 Dashboard：确认组合总值、现金比例、AI 主题曝险和风险告警数量。</li>
                <li>再看 Signals：找出 buy、reduce、sell，优先处理 sell 和 reduce。</li>
                <li>打开 Watchlist 的 Price History：选择单只股票，确认价格是否站上 MA50 和 MA200。</li>
                <li>打开 Watchlist 的 Potential Stocks：只看当前没有持有的候选股票，按 score 从高到低挑选观察名单。</li>
                <li>打开虚拟盘：先用小仓位模拟买卖，观察候选股进入组合后的权重和盈亏变化。</li>
                <li>最后看 Risk：检查单票、高 beta、现金和 AI 主题曝险是否越线。</li>
              </ol>
            </div>

            <div class="card manual-block">
              <h3>二、如何评价一只股票</h3>
              <ol>
                <li>趋势：价格高于 MA200，说明长期趋势偏强；低于 MA200，先降低进攻性。</li>
                <li>中期强弱：价格高于 MA50，说明中期仍有支撑；跌破 MA50，进入观察或减仓区。</li>
                <li>动量：6M momentum 为正，说明过去半年仍在上涨；3M momentum 可用来判断近期是否加速或转弱。</li>
                <li>波动：volatility 越高，仓位越要克制，尤其是 NVDA、MU、MRVL、VRT、PLTR、TSLA 这类高 beta 名单。</li>
                <li>仓位：再好的股票也不能单票过重。本系统默认单只股票不超过 15%，高 beta 股票不超过 10%。</li>
                <li>候选股：如果股票已经在 Portfolio 持仓里，它不会出现在 Potential Stocks；卖出并从持仓移除后，才会重新进入候选池。</li>
              </ol>
            </div>
          </div>

          <div class="card" style="margin-top:12px">
            <div class="section-head"><h2>信号解释</h2><span class="muted">价格 + 均线 + 动量</span></div>
            <div class="content rule-list">
              <div class="rule">${signalPill("buy")}<span><b>买入 / 加仓观察：</b>价格高于 MA200，且 6 个月动量为正。代表长期趋势和中期动量同时站在多头一边。</span></div>
              <div class="rule">${signalPill("hold")}<span><b>持有：</b>价格仍高于 MA50。趋势没有明显破坏，适合继续持有或等待更好的加仓位置。</span></div>
              <div class="rule">${signalPill("reduce")}<span><b>降低仓位：</b>价格低于 MA50。中期趋势开始走弱，适合控制风险、减少过度集中。</span></div>
              <div class="rule">${signalPill("sell")}<span><b>卖出 / 回避：</b>价格低于 MA200。长期趋势转弱，优先考虑防守。</span></div>
            </div>
          </div>

          <div class="grid manual-grid" style="margin-top:12px">
            <div class="card manual-block">
              <h3>三、指标怎么看</h3>
              <ul>
                <li><b>MA20：</b>短期节奏，适合看近期是否过热或回踩。</li>
                <li><b>MA50：</b>中期趋势，适合判断持有还是减仓。</li>
                <li><b>MA200：</b>长期趋势，适合判断是否处于主升趋势。</li>
                <li><b>3M momentum：</b>最近一个季度的涨跌幅，用来观察近期强弱。</li>
                <li><b>6M momentum：</b>半年涨跌幅，是本策略买入信号的核心条件之一。</li>
                <li><b>Volatility：</b>年化波动率，越高代表价格震荡越大，仓位越需要保守。</li>
              </ul>
            </div>

            <div class="card manual-block">
              <h3>四、风险规则</h3>
              <ul>
                <li>单只股票权重不超过 15%。</li>
                <li>高 beta 股票权重不超过 10%。</li>
                <li>Crypto 权重不超过 15%。</li>
                <li>现金权重至少保留 10%。</li>
                <li>AI 主题总曝险不超过 70%。</li>
                <li>虚拟盘不连接真实券商，只用于练习交易流程和观察组合变化。</li>
              </ul>
            </div>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>五、虚拟盘怎么用</h3>
            <ol>
              <li>虚拟盘默认初始现金为 $100,000。</li>
              <li>选择 ticker、buy/sell 和 shares 后提交，系统会用当前最新价格模拟成交。</li>
              <li>买入时不能超过虚拟现金；卖出时不能超过已有虚拟持仓。</li>
              <li>持仓表会显示平均成本、当前价格、市值、权重和未实现盈亏。</li>
              <li>虚拟盘适合先测试 Potential Stocks 的想法，再决定是否加入真实观察或组合计划。</li>
            </ol>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>六、Potential Stocks 怎么用</h3>
            <ol>
              <li>Potential Stocks 显示的是 AI 基建候选宇宙中“当前未持有”的股票。</li>
              <li>候选宇宙包括 Core AI Infra、AI Networking、Power / Cooling、Hyperscaler / AI Software、Speculative AI。</li>
              <li>默认按 score 降序排序，优先看 STRONG CANDIDATE，再看 WATCH CANDIDATE。</li>
              <li>用 Theme 过滤想看的子赛道，比如 AI Networking 或 Power / Cooling。</li>
              <li>用 Rating 过滤候选质量；用 Signal 过滤 buy/sell；用 Volatility 找高波动股票或隐藏高波动股票。</li>
              <li>Entry Zone 用来判断追高风险：Near MA50 support 比 Overextended 更适合找入场点。</li>
            </ol>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>七、候选股评分规则</h3>
            <ol>
              <li>价格 > MA200：加 2 分；否则减 2 分。</li>
              <li>价格 > MA50：加 1 分；否则减 1 分。</li>
              <li>6M momentum > 0：加 2 分；否则减 2 分。</li>
              <li>3M momentum > 0：加 1 分；否则减 1 分。</li>
              <li>Core AI Infra、AI Networking、Power / Cooling：加 2 分。</li>
              <li>Speculative AI：减 1 分。</li>
              <li>年化波动率 > 60%：减 1 分；> 90%：额外减 2 分。</li>
              <li>价格高于 MA50 超过 20%：减 1 分；价格高于 MA200 超过 35%：减 1 分。</li>
            </ol>
          </div>

          <div class="grid manual-grid" style="margin-top:12px">
            <div class="card manual-block">
              <h3>八、Rating 和 Action</h3>
              <ul>
                <li><b>STRONG CANDIDATE：</b>score >= 5，Consider small starter position。</li>
                <li><b>WATCH CANDIDATE：</b>score 3 到 4，Wait for better entry or confirmation。</li>
                <li><b>EARLY WATCH：</b>score 1 到 2，Monitor only。</li>
                <li><b>AVOID / WAIT：</b>score <= 0，Avoid for now。</li>
              </ul>
            </div>

            <div class="card manual-block">
              <h3>九、Entry Zone 解读</h3>
              <ul>
                <li><b>Near MA50 support：</b>价格靠近 MA50，通常是相对更健康的观察区。</li>
                <li><b>Extended but acceptable：</b>价格略高于 MA50，可继续观察确认。</li>
                <li><b>Overextended, wait for pullback：</b>价格离 MA50 太远，避免追高。</li>
                <li><b>Above MA200 but below MA50：</b>长期趋势还在，但中期转弱，等待恢复。</li>
                <li><b>Below MA200, avoid：</b>长期趋势偏弱，优先回避。</li>
              </ul>
            </div>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>十、候选股决策流程</h3>
            <ol>
              <li>先过滤掉 AVOID / WAIT，只留下 STRONG 或 WATCH。</li>
              <li>优先选择 AI 基建核心链条：芯片、网络、电力和散热。</li>
              <li>检查 Entry Zone，避免买入 Overextended 的股票。</li>
              <li>再回到 Portfolio 和 Risk，确认新增仓位不会让单票、高 beta 或 AI 主题曝险超限。</li>
              <li>最后才考虑小仓位试探，不把评分当成自动交易指令。</li>
            </ol>
          </div>`;
      }

      async function render() {
        const target = document.getElementById(active);
        target.innerHTML = `<div class="card empty">加载中...</div>`;
        try {
          if (active === "auth") {
            renderAuth();
            return;
          }
          if (authToken && Object.keys(scoreMap).length === 0) await loadScoreMap();
          if (active === "dashboard") await renderDashboard();
          if (active === "portfolio") await renderPortfolio();
          if (active === "signals") await renderSignals();
          if (active === "risk") await renderRisk();
          if (active === "watchlist") await renderWatchlist();
          if (active === "virtual") await renderVirtualPortfolio();
          if (active === "manual") renderManual();
        } catch (error) {
          if (!authToken) {
            active = "auth";
            document.querySelectorAll(".page").forEach((el) => el.classList.toggle("hidden", el.id !== "auth"));
            renderAuth("请先登录。");
            renderNav();
            return;
          }
          target.innerHTML = `<div class="card empty bad">加载失败：${error.message}</div>`;
        }
      }

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        const button = document.getElementById("refreshBtn");
        button.textContent = "刷新中...";
        button.disabled = true;
        try {
          await api("/data/refresh", { method: "POST" });
          await render();
        } finally {
          button.textContent = "刷新市场数据";
          button.disabled = false;
        }
      });

      renderNav();
    </script>
  </body>
</html>
