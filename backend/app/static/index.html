<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Quant Dashboard</title>
    <style>
      :root {
        --bg: #f3f5f2;
        --panel: #ffffff;
        --ink: #14181d;
        --muted: #64707d;
        --line: #dce2dc;
        --green: #087f5b;
        --red: #b42318;
        --blue: #2458d3;
        --amber: #a16207;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
      }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
      .brand { display: grid; gap: 3px; }
      .brand strong { font-size: 18px; }
      .brand span { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
      nav { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      button, select, input, textarea {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        padding: 9px 12px;
        font: inherit;
        font-size: 14px;
      }
      button, select {
        cursor: pointer;
      }
      textarea { min-height: 38px; resize: vertical; }
      button.active, button.primary { background: var(--ink); border-color: var(--ink); color: white; }
      button:hover { border-color: var(--ink); }
      button.danger { color: var(--red); border-color: #f5c6c3; background: #fff8f7; }
      button.small { padding: 6px 9px; font-size: 12px; }
      main { max-width: 1180px; margin: 0 auto; padding: 24px 18px 48px; }
      .hero {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
      }
      h1 { margin: 0; font-size: 30px; letter-spacing: 0; }
      h2 { margin: 0; font-size: 18px; }
      p { color: var(--muted); margin: 8px 0 0; }
      .grid { display: grid; gap: 12px; }
      .metrics { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 16px; }
      .metric, .card {
        background: var(--panel);
        border: 1px solid var(--line);
      }
      .metric { padding: 16px; }
      .metric label { display: block; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .metric b { display: block; margin-top: 6px; font-size: 25px; }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }
      .content { padding: 16px; }
      .two { grid-template-columns: 1.45fr 0.8fr; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        color: var(--muted);
        background: #f8faf7;
        text-align: left;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      th, td { padding: 12px 14px; border-top: 1px solid var(--line); white-space: nowrap; }
      tbody tr:hover { background: #fbfcfb; }
      .table-wrap { overflow-x: auto; }
      .pill {
        display: inline-flex;
        min-width: 72px;
        justify-content: center;
        padding: 5px 8px;
        border: 1px solid;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .buy { color: var(--green); background: #e9f7f1; border-color: #b8ead8; }
      .hold { color: var(--blue); background: #edf3ff; border-color: #c8d8ff; }
      .reduce { color: var(--amber); background: #fff8e6; border-color: #f3dea3; }
      .sell { color: var(--red); background: #fff0ef; border-color: #f5c6c3; }
      .good { color: var(--green); }
      .bad { color: var(--red); }
      .muted { color: var(--muted); }
      .warning {
        display: flex;
        gap: 10px;
        padding: 12px;
        border: 1px solid #f3dea3;
        background: #fff9eb;
        color: #6d4700;
        margin-bottom: 10px;
      }
      .manual-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .manual-block { padding: 16px; }
      .manual-block h3 { margin: 0 0 10px; font-size: 16px; }
      .manual-block ol, .manual-block ul {
        margin: 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      .manual-block li + li { margin-top: 7px; }
      .rule-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }
      .rule {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px;
        align-items: start;
        padding: 12px;
        border: 1px solid var(--line);
        background: #fbfcfb;
        font-size: 14px;
      }
      .rule b { font-size: 13px; }
      .tabs, .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .tabs button {
        padding: 8px 11px;
      }
      .filters {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfb;
      }
      .filters label {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .filters select {
        min-width: 160px;
        text-transform: none;
        letter-spacing: 0;
      }
      .rating {
        display: inline-flex;
        min-width: 142px;
        justify-content: center;
        padding: 5px 8px;
        border: 1px solid;
        font-size: 12px;
        font-weight: 700;
      }
      .strong { color: var(--green); background: #e9f7f1; border-color: #b8ead8; }
      .watch { color: var(--blue); background: #edf3ff; border-color: #c8d8ff; }
      .early { color: var(--amber); background: #fff8e6; border-color: #f3dea3; }
      .avoid { color: var(--red); background: #fff0ef; border-color: #f5c6c3; }
      .ticker-score {
        font-weight: 800;
      }
      .ticker-green { color: var(--green); }
      .ticker-blue { color: var(--blue); }
      .ticker-yellow { color: var(--amber); }
      .ticker-red { color: var(--red); }
      .ticker-gray { color: var(--muted); }
      .held-badge {
        display: inline-flex;
        margin-left: 7px;
        border: 1px solid var(--blue);
        background: #edf3ff;
        color: var(--blue);
        padding: 2px 6px;
        font-size: 11px;
        font-weight: 800;
      }
      .auth-panel {
        max-width: 520px;
        margin: 36px auto;
      }
      .auth-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 16px 16px 0;
      }
      .auth-form {
        display: grid;
        gap: 10px;
        padding: 16px;
      }
      .auth-form input {
        border: 1px solid var(--line);
        padding: 10px 12px;
        font: inherit;
      }
      .user-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: #fbfcfb;
        font-size: 13px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfb;
      }
      .form-grid label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .form-grid .wide { grid-column: span 2; }
      .form-actions {
        display: flex;
        gap: 8px;
        align-items: end;
      }
      .trade-form {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
        gap: 10px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfb;
      }
      .trade-form label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .trade-form input {
        border: 1px solid var(--line);
        padding: 9px 12px;
        font: inherit;
        font-size: 14px;
      }
      .hidden { display: none; }
      .empty { padding: 20px; color: var(--muted); }

      @media (max-width: 820px) {
        .metrics, .two, .manual-grid, .trade-form, .form-grid { grid-template-columns: 1fr; }
        .form-grid .wide { grid-column: span 1; }
        .hero { align-items: stretch; flex-direction: column; }
        h1 { font-size: 25px; }
        nav button { flex: 1 1 auto; }
        .rule { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div class="brand">
          <strong>Quant Foundry</strong>
          <span>AI Infrastructure Portfolio Engine</span>
        </div>
        <nav id="nav"></nav>
      </div>
    </header>

    <main>
      <section class="hero" id="heroSection">
        <div>
          <h1>AI 基建量化仪表盘</h1>
          <p>跟踪持仓、目标权重、趋势信号和风险约束。</p>
        </div>
        <button class="primary" id="refreshBtn">刷新市场数据</button>
      </section>

      <section id="auth" class="page hidden"></section>
      <section id="dashboard" class="page"></section>
      <section id="portfolio" class="page hidden"></section>
      <section id="signals" class="page hidden"></section>
      <section id="risk" class="page hidden"></section>
      <section id="watchlist" class="page hidden"></section>
      <section id="virtual" class="page hidden"></section>
      <section id="leaderboard" class="page hidden"></section>
      <section id="manual" class="page hidden"></section>
    </main>

    <script>
      const pages = [
        ["dashboard", "Dashboard"],
        ["portfolio", "Portfolio"],
        ["signals", "Signals"],
        ["watchlist", "Watchlist"],
        ["risk", "Risk"],
        ["virtual", "Virtual Trading"],
        ["leaderboard", "Leaderboard"],
        ["manual", "使用手册"]
      ];
      const universe = ["QQQ", "NVDA", "AVGO", "TSM", "MU", "MRVL", "VRT", "ANET", "AMZN", "PLTR", "TSLA"];
      let active = "dashboard";
      let selectedTicker = "NVDA";
      let watchlistMode = "prices";
      let candidateFilters = { theme: "All", rating: "All", signal: "All", volatility: "All" };
      let virtualTickers = [];
      let virtualLookup = null;
      let authToken = localStorage.getItem("quant_auth_token") || "";
      let currentUser = null;
      let scoreMap = {};
      let authMode = "login";
      let portfolioEdit = null;
      let leaderboardSort = "total_profit_pct";

      const fmtCurrency = (value) => value == null ? "--" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value);
      const fmtPct = (value) => value == null ? "--" : `${(value * 100).toFixed(1)}%`;
      const api = (path, options = {}) => {
        const headers = { ...(options.headers || {}) };
        if (authToken) headers.Authorization = `Bearer ${authToken}`;
        return fetch(path, { ...options, headers }).then(async (res) => {
        if (!res.ok) {
          let detail = `${path} ${res.status}`;
          try {
            const payload = await res.json();
            detail = payload.detail || detail;
          } catch {}
          if (res.status === 401) {
            authToken = "";
            currentUser = null;
            authMode = "login";
            localStorage.removeItem("quant_auth_token");
            active = "auth";
          }
          throw new Error(detail);
        }
        return res.json();
        });
      };
      const signalPill = (signal) => `<span class="pill ${signal || "hold"}">${signal || "hold"}</span>`;
      const getTickerColor = (score) => {
        if (score === null || score === undefined) return "ticker-gray";
        if (score >= 5) return "ticker-green";
        if (score >= 3) return "ticker-blue";
        if (score >= 1) return "ticker-yellow";
        return "ticker-red";
      };
      const tickerLabel = (ticker, score = scoreMap[ticker], extra = "") => `<span class="ticker-score ${getTickerColor(score)}">${ticker}</span>${extra}`;
      const ratingClass = (rating) => {
        if (rating === "STRONG CANDIDATE") return "strong";
        if (rating === "WATCH CANDIDATE") return "watch";
        if (rating === "EARLY WATCH") return "early";
        return "avoid";
      };
      const ratingPill = (rating) => `<span class="rating ${ratingClass(rating)}">${rating}</span>`;

      function setActive(page) {
        if (page === "logout") {
          authToken = "";
          currentUser = null;
          scoreMap = {};
          authMode = "login";
          localStorage.removeItem("quant_auth_token");
          page = "auth";
        }
        if (!authToken && page !== "auth") page = "auth";
        active = page;
        document.querySelectorAll(".page").forEach((el) => el.classList.toggle("hidden", el.id !== page));
        document.getElementById("heroSection").classList.toggle("hidden", !authToken);
        document.querySelectorAll("nav button").forEach((btn) => btn.classList.toggle("active", btn.dataset.page === page));
        renderNav();
        render();
      }

      function renderNav() {
        const nav = document.getElementById("nav");
        if (!authToken) {
          nav.innerHTML = `<button data-page="auth" class="active">Login / Register</button>`;
        } else {
          nav.innerHTML = `${pages.map(([id, label]) => `<button data-page="${id}" class="${active === id ? "active" : ""}">${label}</button>`).join("")}<span class="user-chip">${currentUser?.username || "User"}</span><button data-page="logout">Logout</button>`;
        }
        document.querySelectorAll("nav button").forEach((btn) => btn.addEventListener("click", () => setActive(btn.dataset.page)));
      }

      async function fetchCurrentUser() {
        if (!authToken) return null;
        const result = await api("/auth/me");
        currentUser = result.user;
        return currentUser;
      }

      async function finishAuth(result) {
        authToken = result.token;
        authMode = "login";
        localStorage.setItem("quant_auth_token", authToken);
        await fetchCurrentUser();
        await loadScoreMap();
        setActive("dashboard");
      }

      function rows(items, cols) {
        return items.map((item) => `<tr>${cols.map((col) => `<td>${col(item)}</td>`).join("")}</tr>`).join("");
      }

      async function loadScoreMap() {
        if (!authToken) return;
        try {
          const data = await api("/watchlist/potential");
          scoreMap = Object.fromEntries(data.potential_stocks.map((item) => [item.ticker, item.score]));
        } catch {
          scoreMap = {};
        }
      }

      function renderAuth(message = "") {
        const isRegister = authMode === "register";
        document.getElementById("auth").innerHTML = `
          <div class="card auth-panel">
            <div class="section-head"><h2>${isRegister ? "注册账户" : "登录账户"}</h2><span class="muted">Portfolio and virtual trades are user-specific</span></div>
            <div class="auth-toggle">
              <button id="showLogin" class="${!isRegister ? "primary" : ""}">Login</button>
              <button id="showRegister" class="${isRegister ? "primary" : ""}">Register</button>
            </div>
            ${!isRegister ? `
              <form class="auth-form" id="loginForm">
                <input id="loginIdentity" placeholder="email or username" autocomplete="username" />
                <input id="loginPassword" placeholder="password" type="password" autocomplete="current-password" />
                <button class="primary" type="submit">登录</button>
              </form>
            ` : `
              <form class="auth-form" id="registerForm">
                <input id="registerUsername" placeholder="username" autocomplete="username" />
                <input id="registerEmail" placeholder="email" autocomplete="email" />
                <input id="registerPassword" placeholder="password, min 6 chars" type="password" autocomplete="new-password" />
                <input id="registerConfirm" placeholder="confirm password" type="password" autocomplete="new-password" />
                <button class="primary" type="submit">注册并登录</button>
              </form>
            `}
            <div class="${message.includes("失败") || message.includes("Invalid") ? "bad" : "muted"}" style="padding:0 16px 16px">${message}</div>
          </div>`;
        document.getElementById("showLogin").addEventListener("click", () => {
          authMode = "login";
          renderAuth();
        });
        document.getElementById("showRegister").addEventListener("click", () => {
          authMode = "register";
          renderAuth();
        });
        if (!isRegister) document.getElementById("loginForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          try {
            const result = await api("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                username_or_email: document.getElementById("loginIdentity").value.trim(),
                password: document.getElementById("loginPassword").value
              })
            });
            await finishAuth(result);
          } catch (error) {
            renderAuth(`登录失败：${error.message}`);
          }
        });
        if (isRegister) document.getElementById("registerForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const username = document.getElementById("registerUsername").value.trim();
          const email = document.getElementById("registerEmail").value.trim();
          const password = document.getElementById("registerPassword").value;
          const confirm = document.getElementById("registerConfirm").value;
          if (!username) return renderAuth("注册失败：username cannot be empty");
          if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return renderAuth("注册失败：email must be valid");
          if (password.length < 6) return renderAuth("注册失败：password must be at least 6 characters");
          if (password !== confirm) return renderAuth("注册失败：password and confirm password must match");
          try {
            const result = await api("/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                username,
                email,
                password
              })
            });
            await finishAuth(result);
          } catch (error) {
            renderAuth(`注册失败：${error.message}`);
          }
        });
      }

      async function renderDashboard() {
        const [data, recs] = await Promise.all([api("/report/daily"), api("/recommendations/buy")]);
        const counts = data.signal_counts || {};
        document.getElementById("dashboard").innerHTML = `
          <div class="grid metrics">
            <div class="metric"><label>Portfolio Value</label><b>${fmtCurrency(data.portfolio_value)}</b></div>
            <div class="metric"><label>Cash</label><b>${fmtCurrency(data.cash)}</b></div>
            <div class="metric"><label>AI Exposure</label><b>${fmtPct(data.risk_summary.ai_theme_exposure)}</b></div>
            <div class="metric"><label>Warnings</label><b class="${data.risk_warnings.length ? "bad" : "good"}">${data.risk_warnings.length}</b></div>
          </div>
          <div class="grid two">
            <div class="card">
              <div class="section-head"><h2>信号总览</h2><span class="muted">${data.data.latest_date || "无数据"}</span></div>
              <div class="table-wrap"><table>
                <thead><tr><th>Ticker</th><th>Price</th><th>6M Momentum</th><th>Signal</th></tr></thead>
                <tbody>${rows(data.top_signals, [
                  (x) => tickerLabel(x.ticker),
                  (x) => fmtCurrency(x.price),
                  (x) => fmtPct(x.momentum_6m),
                  (x) => signalPill(x.signal)
                ])}</tbody>
              </table></div>
            </div>
            <div class="card">
              <div class="section-head"><h2>今日脉冲</h2></div>
              <div class="content">
                ${["buy", "hold", "reduce", "sell"].map((key) => `<p style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:10px">${signalPill(key)} <b>${counts[key] || 0}</b></p>`).join("")}
              </div>
            </div>
          </div>`;
        document.getElementById("dashboard").insertAdjacentHTML("beforeend", `
          <div class="card" style="margin-top:12px">
            <div class="section-head"><h2>Suggested Purchases</h2><span class="muted">User-specific balance + risk checks</span></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Ticker</th><th>Company</th><th>Theme</th><th>Score</th><th>Suggested Weight</th><th>Risk</th><th>Reason</th><th>Action</th></tr></thead>
              <tbody>${recs.recommendations.length ? rows(recs.recommendations.slice(0, 8), [
                (x) => tickerLabel(x.ticker, x.score),
                (x) => x.company_name,
                (x) => x.theme,
                (x) => `<b>${x.score}</b>`,
                (x) => fmtPct(x.suggested_weight),
                (x) => `<span class="${x.risk_check_status === "PASS" ? "good" : "bad"}">${x.risk_check_status}</span>`,
                (x) => x.reason,
                (x) => x.suggested_action
              ]) : `<tr><td colspan="8" class="empty">暂无建议。可以刷新市场数据或调整持仓目标权重后再看。</td></tr>`}</tbody>
            </table></div>
          </div>`);
      }

      async function renderPortfolio() {
        const data = await api("/portfolio");
        const edit = portfolioEdit || { ticker: "", shares: 0, average_cost: 0, target_weight: 0, theme: "", is_high_beta: false, notes: "" };
        document.getElementById("portfolio").innerHTML = `
          <div class="card">
            <div class="section-head"><h2>Portfolio</h2><span class="muted">Total ${fmtCurrency(data.total_value)}</span></div>
            <form class="form-grid" id="holdingForm">
              <label>Ticker
                <input id="holdingTicker" value="${edit.ticker || ""}" placeholder="NVDA" />
              </label>
              <label>Shares
                <input id="holdingShares" type="number" min="0" step="0.0001" value="${edit.shares ?? 0}" />
              </label>
              <label>Average Cost
                <input id="holdingCost" type="number" min="0" step="0.01" value="${edit.average_cost ?? 0}" />
              </label>
              <label>Target Weight
                <input id="holdingTarget" type="number" min="0" step="0.01" value="${((edit.target_weight || 0) * 100).toFixed(2)}" />
              </label>
              <label>Theme
                <input id="holdingTheme" value="${edit.theme || ""}" placeholder="Core AI Infra" />
              </label>
              <label>High Beta
                <select id="holdingHighBeta">
                  <option value="false" ${!edit.is_high_beta ? "selected" : ""}>No</option>
                  <option value="true" ${edit.is_high_beta ? "selected" : ""}>Yes</option>
                </select>
              </label>
              <label class="wide">Notes
                <input id="holdingNotes" value="${edit.notes || ""}" placeholder="optional" />
              </label>
              <div class="form-actions">
                <button class="primary" type="submit">${portfolioEdit ? "保存持仓" : "添加持仓"}</button>
                ${portfolioEdit ? `<button type="button" id="cancelHolding">取消</button>` : ""}
              </div>
            </form>
            <div class="table-wrap"><table>

            return null;

              <ul>
                <li><b>MA20：</b>短期节奏，适合看近期是否过热或回踩。</li>
                <li><b>MA50：</b>中期趋势，适合判断持有还是减仓。</li>
                <li><b>MA200：</b>长期趋势，适合判断是否处于主升趋势。</li>
                <li><b>3M momentum：</b>最近一个季度的涨跌幅，用来观察近期强弱。</li>
                <li><b>6M momentum：</b>半年涨跌幅，是本策略买入信号的核心条件之一。</li>
                <li><b>Volatility：</b>年化波动率，越高代表价格震荡越大，仓位越需要保守。</li>
              </ul>
            </div>

            <div class="card manual-block">
              <h3>四、风险规则</h3>
              <ul>
                <li>单只股票权重不超过 15%。</li>
                <li>高 beta 股票权重不超过 10%。</li>
                <li>Crypto 权重不超过 15%。</li>
                <li>现金权重至少保留 10%。</li>
                <li>AI 主题总曝险不超过 70%。</li>
                <li>Virtual Trading 不连接真实券商，只用于练习交易流程和观察组合变化。</li>
              </ul>
            </div>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>五、账户和 Portfolio 怎么用</h3>
            <ol>
              <li>每个用户都有自己的 Portfolio、Virtual Trading 和 watchlist notes；登录后只能看到自己的数据。</li>
              <li>Portfolio 可以新增、编辑、删除持仓，字段包括 ticker、shares、average cost、target weight、theme、high beta 和 notes。</li>
              <li>修改持仓后，Dashboard、Risk、Potential Stocks 和 Suggested Purchases 会基于新组合重新计算。</li>
              <li>target weight 用百分比填写，例如 5 代表目标权重 5%。</li>
              <li>Dashboard 的 Suggested Purchases 会优先寻找高分、补足缺失主题且不触发风险规则的候选股。</li>
            </ol>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>六、Potential Stocks 怎么用</h3>
            <ol>
              <li>Potential Stocks 显示完整 AI 基建候选宇宙，股票可以同时出现在 Portfolio 和 Potential Stocks。</li>
              <li>已持有股票会显示 HELD，并展示 current weight 与 target weight。</li>
              <li>候选宇宙包括 Core AI Infra、AI Networking、Power / Cooling、Hyperscaler / AI Software、Speculative AI。</li>
              <li>默认按 score 降序排序，优先看 STRONG CANDIDATE，再看 WATCH CANDIDATE。</li>
              <li>用 Theme 过滤想看的子赛道，比如 AI Networking 或 Power / Cooling。</li>
              <li>用 Rating 过滤候选质量；用 Signal 过滤 buy/sell；用 Volatility 找高波动股票或隐藏高波动股票。</li>
              <li>Entry Zone 用来判断追高风险：Near MA50 support 比 Overextended 更适合找入场点。</li>
            </ol>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>七、候选股评分规则</h3>
            <ol>
              <li>价格 > MA200：加 2 分；否则减 2 分。</li>
              <li>价格 > MA50：加 1 分；否则减 1 分。</li>
              <li>6M momentum > 0：加 2 分；否则减 2 分。</li>
              <li>3M momentum > 0：加 1 分；否则减 1 分。</li>
              <li>Core AI Infra、AI Networking、Power / Cooling：加 2 分。</li>
              <li>Speculative AI：减 1 分。</li>
              <li>年化波动率 > 60%：减 1 分；> 90%：额外减 2 分。</li>
              <li>价格高于 MA50 超过 20%：减 1 分；价格高于 MA200 超过 35%：减 1 分。</li>
            </ol>
          </div>

          <div class="grid manual-grid" style="margin-top:12px">
            <div class="card manual-block">
              <h3>八、Rating 和 Action</h3>
              <ul>
                <li><b>STRONG CANDIDATE：</b>score >= 5，Consider small starter position。</li>
                <li><b>WATCH CANDIDATE：</b>score 3 到 4，Wait for better entry or confirmation。</li>
                <li><b>EARLY WATCH：</b>score 1 到 2，Monitor only。</li>
                <li><b>AVOID / WAIT：</b>score <= 0，Avoid for now。</li>
              </ul>
            </div>

            <div class="card manual-block">
              <h3>九、Entry Zone 解读</h3>
              <ul>
                <li><b>Near MA50 support：</b>价格靠近 MA50，通常是相对更健康的观察区。</li>
                <li><b>Extended but acceptable：</b>价格略高于 MA50，可继续观察确认。</li>
                <li><b>Overextended, wait for pullback：</b>价格离 MA50 太远，避免追高。</li>
                <li><b>Above MA200 but below MA50：</b>长期趋势还在，但中期转弱，等待恢复。</li>
                <li><b>Below MA200, avoid：</b>长期趋势偏弱，优先回避。</li>
              </ul>
            </div>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>十、Virtual Trading 和 Leaderboard</h3>
            <ol>
              <li>Virtual Trading 默认初始现金为 $100,000。</li>
              <li>手动输入 ticker，系统会自动大写、校验格式、拉取最新价格，并显示公司名、score 和 signal。</li>
              <li>BUY 会检查现金是否足够；SELL 会检查持股数量是否足够。</li>
              <li>Leaderboard 按用户虚拟盘表现公开排名，默认按 total profit % 排序。</li>
              <li>active days 从第一笔交易日期算到今天；profit per day = total profit / active days。</li>
            </ol>
          </div>`;
      }

      async function render() {
        const target = document.getElementById(active);
        target.innerHTML = `<div class="card empty">加载中...</div>`;
        try {
          if (active === "auth") {
            renderAuth();
            return;
          }
          if (authToken && Object.keys(scoreMap).length === 0) await loadScoreMap();
          if (active === "dashboard") await renderDashboard();
          if (active === "portfolio") await renderPortfolio();
          if (active === "signals") await renderSignals();
          if (active === "risk") await renderRisk();
          if (active === "watchlist") await renderWatchlist();
          if (active === "virtual") await renderVirtualPortfolio();
          if (active === "leaderboard") await renderLeaderboard();
          if (active === "manual") renderManual();
        } catch (error) {
          if (!authToken) {
            active = "auth";
            document.querySelectorAll(".page").forEach((el) => el.classList.toggle("hidden", el.id !== "auth"));
            renderAuth("请先登录。");
            renderNav();
            return;
          }
          target.innerHTML = `<div class="card empty bad">加载失败：${error.message}</div>`;
        }
      }

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        const button = document.getElementById("refreshBtn");
        button.textContent = "刷新中...";
        button.disabled = true;
        try {
          await api("/data/refresh", { method: "POST" });
          await render();
        } finally {
          button.textContent = "刷新市场数据";
          button.disabled = false;
        }
      });

      async function boot() {
        if (authToken) {
          try {
            await fetchCurrentUser();
          } catch {
            authToken = "";
            currentUser = null;
            authMode = "login";
            localStorage.removeItem("quant_auth_token");
            active = "auth";
          }
        } else {
          authMode = "login";
          active = "auth";
        }
        renderNav();
        setActive(authToken ? active : "auth");
      }

      boot();
    </script>
  </body>
</html>
