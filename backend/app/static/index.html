<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Quant Dashboard</title>
    <style>
      :root {
        --bg: #f3f5f2;
        --panel: #ffffff;
        --ink: #14181d;
        --muted: #64707d;
        --line: #dce2dc;
        --green: #087f5b;
        --red: #b42318;
        --blue: #2458d3;
        --amber: #a16207;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
      }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
      .brand { display: grid; gap: 3px; }
      .brand strong { font-size: 18px; }
      .brand span { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
      nav { display: flex; gap: 8px; flex-wrap: wrap; }
      button, select {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        padding: 9px 12px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
      }
      button.active, button.primary { background: var(--ink); border-color: var(--ink); color: white; }
      button:hover { border-color: var(--ink); }
      main { max-width: 1180px; margin: 0 auto; padding: 24px 18px 48px; }
      .hero {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
      }
      h1 { margin: 0; font-size: 30px; letter-spacing: 0; }
      h2 { margin: 0; font-size: 18px; }
      p { color: var(--muted); margin: 8px 0 0; }
      .grid { display: grid; gap: 12px; }
      .metrics { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 16px; }
      .metric, .card {
        background: var(--panel);
        border: 1px solid var(--line);
      }
      .metric { padding: 16px; }
      .metric label { display: block; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .metric b { display: block; margin-top: 6px; font-size: 25px; }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }
      .content { padding: 16px; }
      .two { grid-template-columns: 1.45fr 0.8fr; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        color: var(--muted);
        background: #f8faf7;
        text-align: left;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      th, td { padding: 12px 14px; border-top: 1px solid var(--line); white-space: nowrap; }
      tbody tr:hover { background: #fbfcfb; }
      .table-wrap { overflow-x: auto; }
      .pill {
        display: inline-flex;
        min-width: 72px;
        justify-content: center;
        padding: 5px 8px;
        border: 1px solid;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .buy { color: var(--green); background: #e9f7f1; border-color: #b8ead8; }
      .hold { color: var(--blue); background: #edf3ff; border-color: #c8d8ff; }
      .reduce { color: var(--amber); background: #fff8e6; border-color: #f3dea3; }
      .sell { color: var(--red); background: #fff0ef; border-color: #f5c6c3; }
      .good { color: var(--green); }
      .bad { color: var(--red); }
      .muted { color: var(--muted); }
      .warning {
        display: flex;
        gap: 10px;
        padding: 12px;
        border: 1px solid #f3dea3;
        background: #fff9eb;
        color: #6d4700;
        margin-bottom: 10px;
      }
      .manual-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .manual-block { padding: 16px; }
      .manual-block h3 { margin: 0 0 10px; font-size: 16px; }
      .manual-block ol, .manual-block ul {
        margin: 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      .manual-block li + li { margin-top: 7px; }
      .rule-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }
      .rule {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px;
        align-items: start;
        padding: 12px;
        border: 1px solid var(--line);
        background: #fbfcfb;
        font-size: 14px;
      }
      .rule b { font-size: 13px; }
      .hidden { display: none; }
      .empty { padding: 20px; color: var(--muted); }

      @media (max-width: 820px) {
        .metrics, .two, .manual-grid { grid-template-columns: 1fr; }
        .hero { align-items: stretch; flex-direction: column; }
        h1 { font-size: 25px; }
        nav button { flex: 1 1 auto; }
        .rule { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div class="brand">
          <strong>Quant Foundry</strong>
          <span>AI Infrastructure Portfolio Engine</span>
        </div>
        <nav id="nav"></nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div>
          <h1>AI 基建量化仪表盘</h1>
          <p>跟踪持仓、目标权重、趋势信号和风险约束。</p>
        </div>
        <button class="primary" id="refreshBtn">刷新市场数据</button>
      </section>

      <section id="dashboard" class="page"></section>
      <section id="portfolio" class="page hidden"></section>
      <section id="signals" class="page hidden"></section>
      <section id="risk" class="page hidden"></section>
      <section id="watchlist" class="page hidden"></section>
      <section id="manual" class="page hidden"></section>
    </main>

    <script>
      const pages = [
        ["dashboard", "Dashboard"],
        ["portfolio", "Portfolio"],
        ["signals", "Signals"],
        ["risk", "Risk"],
        ["watchlist", "Watchlist"],
        ["manual", "使用手册"]
      ];
      const universe = ["QQQ", "NVDA", "AVGO", "TSM", "MU", "MRVL", "VRT", "ANET", "AMZN", "PLTR", "TSLA"];
      let active = "dashboard";
      let selectedTicker = "NVDA";

      const fmtCurrency = (value) => value == null ? "--" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value);
      const fmtPct = (value) => value == null ? "--" : `${(value * 100).toFixed(1)}%`;
      const api = (path, options) => fetch(path, options).then((res) => {
        if (!res.ok) throw new Error(`${path} ${res.status}`);
        return res.json();
      });
      const signalPill = (signal) => `<span class="pill ${signal || "hold"}">${signal || "hold"}</span>`;

      function setActive(page) {
        active = page;
        document.querySelectorAll(".page").forEach((el) => el.classList.toggle("hidden", el.id !== page));
        document.querySelectorAll("nav button").forEach((btn) => btn.classList.toggle("active", btn.dataset.page === page));
        render();
      }

      function renderNav() {
        document.getElementById("nav").innerHTML = pages.map(([id, label]) => `<button data-page="${id}">${label}</button>`).join("");
        document.querySelectorAll("nav button").forEach((btn) => btn.addEventListener("click", () => setActive(btn.dataset.page)));
        setActive(active);
      }

      function rows(items, cols) {
        return items.map((item) => `<tr>${cols.map((col) => `<td>${col(item)}</td>`).join("")}</tr>`).join("");
      }

      async function renderDashboard() {
        const data = await api("/report/daily");
        const counts = data.signal_counts || {};
        document.getElementById("dashboard").innerHTML = `
          <div class="grid metrics">
            <div class="metric"><label>Portfolio Value</label><b>${fmtCurrency(data.portfolio_value)}</b></div>
            <div class="metric"><label>Cash</label><b>${fmtCurrency(data.cash)}</b></div>
            <div class="metric"><label>AI Exposure</label><b>${fmtPct(data.risk_summary.ai_theme_exposure)}</b></div>
            <div class="metric"><label>Warnings</label><b class="${data.risk_warnings.length ? "bad" : "good"}">${data.risk_warnings.length}</b></div>
          </div>
          <div class="grid two">
            <div class="card">
              <div class="section-head"><h2>信号总览</h2><span class="muted">${data.data.latest_date || "无数据"}</span></div>
              <div class="table-wrap"><table>
                <thead><tr><th>Ticker</th><th>Price</th><th>6M Momentum</th><th>Signal</th></tr></thead>
                <tbody>${rows(data.top_signals, [
                  (x) => `<b>${x.ticker}</b>`,
                  (x) => fmtCurrency(x.price),
                  (x) => fmtPct(x.momentum_6m),
                  (x) => signalPill(x.signal)
                ])}</tbody>
              </table></div>
            </div>
            <div class="card">
              <div class="section-head"><h2>今日脉冲</h2></div>
              <div class="content">
                ${["buy", "hold", "reduce", "sell"].map((key) => `<p style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:10px">${signalPill(key)} <b>${counts[key] || 0}</b></p>`).join("")}
              </div>
            </div>
          </div>`;
      }

      async function renderPortfolio() {
        const data = await api("/portfolio");
        document.getElementById("portfolio").innerHTML = `
          <div class="card">
            <div class="section-head"><h2>Portfolio</h2><span class="muted">Total ${fmtCurrency(data.total_value)}</span></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Ticker</th><th>Shares</th><th>Price</th><th>Value</th><th>Current</th><th>Target</th><th>Gap</th></tr></thead>
              <tbody>
                ${rows(data.holdings, [
                  (x) => `<b>${x.ticker}</b>`,
                  (x) => x.shares,
                  (x) => fmtCurrency(x.price),
                  (x) => fmtCurrency(x.market_value),
                  (x) => fmtPct(x.current_weight),
                  (x) => fmtPct(x.target_weight),
                  (x) => `<span class="${x.weight_gap >= 0 ? "good" : "bad"}">${fmtPct(x.weight_gap)}</span>`
                ])}
                <tr><td><b>Cash</b></td><td>--</td><td>--</td><td>${fmtCurrency(data.cash)}</td><td>${fmtPct(data.cash / data.total_value)}</td><td>${fmtPct(data.target_weights.CASH)}</td><td>${fmtPct(data.target_weights.CASH - data.cash / data.total_value)}</td></tr>
              </tbody>
            </table></div>
          </div>`;
      }

      async function renderSignals() {
        const data = await api("/signals");
        document.getElementById("signals").innerHTML = `
          <div class="card">
            <div class="section-head"><h2>Signals</h2><span class="muted">MA20 / MA50 / MA200 + Momentum</span></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Ticker</th><th>Close</th><th>MA50</th><th>MA200</th><th>3M</th><th>6M</th><th>Vol</th><th>Signal</th></tr></thead>
              <tbody>${rows(data.signals, [
                (x) => `<b>${x.ticker}</b>`,
                (x) => fmtCurrency(x.price),
                (x) => fmtCurrency(x.ma50),
                (x) => fmtCurrency(x.ma200),
                (x) => fmtPct(x.momentum_3m),
                (x) => fmtPct(x.momentum_6m),
                (x) => fmtPct(x.volatility),
                (x) => signalPill(x.signal)
              ])}</tbody>
            </table></div>
          </div>`;
      }

      async function renderRisk() {
        const data = await api("/risk");
        document.getElementById("risk").innerHTML = `
          <div class="grid metrics">
            <div class="metric"><label>Cash Weight</label><b>${fmtPct(data.summary.cash_weight)}</b></div>
            <div class="metric"><label>AI Exposure</label><b>${fmtPct(data.summary.ai_theme_exposure)}</b></div>
            <div class="metric"><label>High Beta</label><b>${fmtPct(data.summary.high_beta_exposure)}</b></div>
            <div class="metric"><label>Crypto</label><b>${fmtPct(data.summary.crypto_exposure)}</b></div>
          </div>
          <div class="card">
            <div class="section-head"><h2>Risk Warnings</h2></div>
            <div class="content">
              ${data.warnings.length ? data.warnings.map((x) => `<div class="warning">⚠ ${x.message}</div>`).join("") : `<div class="empty">当前没有风险告警。</div>`}
            </div>
          </div>`;
      }

      async function renderWatchlist() {
        const data = await api(`/prices/${selectedTicker}`);
        const last = data.prices[data.prices.length - 1];
        document.getElementById("watchlist").innerHTML = `
          <div class="card">
            <div class="section-head">
              <h2>Watchlist</h2>
              <select id="tickerSelect">${universe.map((x) => `<option ${x === selectedTicker ? "selected" : ""}>${x}</option>`).join("")}</select>
            </div>
            ${last ? `<div class="grid metrics" style="padding:16px;margin:0">
              <div class="metric"><label>Close</label><b>${fmtCurrency(last.close)}</b></div>
              <div class="metric"><label>MA20</label><b>${fmtCurrency(last.ma20)}</b></div>
              <div class="metric"><label>MA50</label><b>${fmtCurrency(last.ma50)}</b></div>
              <div class="metric"><label>6M Momentum</label><b>${fmtPct(last.momentum_6m)}</b></div>
            </div>` : `<div class="empty">暂无价格数据。</div>`}
            <div class="table-wrap"><table>
              <thead><tr><th>Date</th><th>Close</th><th>MA20</th><th>MA50</th><th>MA200</th><th>Vol</th></tr></thead>
              <tbody>${rows(data.prices.slice(-40).reverse(), [
                (x) => x.date,
                (x) => fmtCurrency(x.close),
                (x) => fmtCurrency(x.ma20),
                (x) => fmtCurrency(x.ma50),
                (x) => fmtCurrency(x.ma200),
                (x) => fmtPct(x.volatility)
              ])}</tbody>
            </table></div>
          </div>`;
        document.getElementById("tickerSelect").addEventListener("change", (event) => {
          selectedTicker = event.target.value;
          renderWatchlist();
        });
      }

      function renderManual() {
        document.getElementById("manual").innerHTML = `
          <div class="grid manual-grid">
            <div class="card manual-block">
              <h3>一、每天怎么用</h3>
              <ol>
                <li>先看 Dashboard：确认组合总值、现金比例、AI 主题曝险和风险告警数量。</li>
                <li>再看 Signals：找出 buy、reduce、sell，优先处理 sell 和 reduce。</li>
                <li>打开 Watchlist：选择单只股票，确认价格是否站上 MA50 和 MA200。</li>
                <li>最后看 Risk：检查单票、高 beta、现金和 AI 主题曝险是否越线。</li>
              </ol>
            </div>

            <div class="card manual-block">
              <h3>二、如何评价一只股票</h3>
              <ol>
                <li>趋势：价格高于 MA200，说明长期趋势偏强；低于 MA200，先降低进攻性。</li>
                <li>中期强弱：价格高于 MA50，说明中期仍有支撑；跌破 MA50，进入观察或减仓区。</li>
                <li>动量：6M momentum 为正，说明过去半年仍在上涨；3M momentum 可用来判断近期是否加速或转弱。</li>
                <li>波动：volatility 越高，仓位越要克制，尤其是 NVDA、MU、MRVL、VRT、PLTR、TSLA 这类高 beta 名单。</li>
                <li>仓位：再好的股票也不能单票过重。本系统默认单只股票不超过 15%，高 beta 股票不超过 10%。</li>
              </ol>
            </div>
          </div>

          <div class="card" style="margin-top:12px">
            <div class="section-head"><h2>信号解释</h2><span class="muted">价格 + 均线 + 动量</span></div>
            <div class="content rule-list">
              <div class="rule">${signalPill("buy")}<span><b>买入 / 加仓观察：</b>价格高于 MA200，且 6 个月动量为正。代表长期趋势和中期动量同时站在多头一边。</span></div>
              <div class="rule">${signalPill("hold")}<span><b>持有：</b>价格仍高于 MA50。趋势没有明显破坏，适合继续持有或等待更好的加仓位置。</span></div>
              <div class="rule">${signalPill("reduce")}<span><b>降低仓位：</b>价格低于 MA50。中期趋势开始走弱，适合控制风险、减少过度集中。</span></div>
              <div class="rule">${signalPill("sell")}<span><b>卖出 / 回避：</b>价格低于 MA200。长期趋势转弱，优先考虑防守。</span></div>
            </div>
          </div>

          <div class="grid manual-grid" style="margin-top:12px">
            <div class="card manual-block">
              <h3>三、指标怎么看</h3>
              <ul>
                <li><b>MA20：</b>短期节奏，适合看近期是否过热或回踩。</li>
                <li><b>MA50：</b>中期趋势，适合判断持有还是减仓。</li>
                <li><b>MA200：</b>长期趋势，适合判断是否处于主升趋势。</li>
                <li><b>3M momentum：</b>最近一个季度的涨跌幅，用来观察近期强弱。</li>
                <li><b>6M momentum：</b>半年涨跌幅，是本策略买入信号的核心条件之一。</li>
                <li><b>Volatility：</b>年化波动率，越高代表价格震荡越大，仓位越需要保守。</li>
              </ul>
            </div>

            <div class="card manual-block">
              <h3>四、风险规则</h3>
              <ul>
                <li>单只股票权重不超过 15%。</li>
                <li>高 beta 股票权重不超过 10%。</li>
                <li>Crypto 权重不超过 15%。</li>
                <li>现金权重至少保留 10%。</li>
                <li>AI 主题总曝险不超过 70%。</li>
              </ul>
            </div>
          </div>

          <div class="card manual-block" style="margin-top:12px">
            <h3>五、一个实用打分框架</h3>
            <ol>
              <li>价格 > MA200：加 2 分；否则减 2 分。</li>
              <li>价格 > MA50：加 1 分；否则减 1 分。</li>
              <li>6M momentum > 0：加 2 分；否则减 2 分。</li>
              <li>3M momentum > 0：加 1 分；否则减 1 分。</li>
              <li>Volatility 明显高于组合其他股票：减 1 分，并降低目标仓位。</li>
              <li>如果总分大于等于 4，可列入加仓候选；1 到 3 分偏持有；小于等于 0 分优先观察、减仓或回避。</li>
            </ol>
          </div>`;
      }

      async function render() {
        const target = document.getElementById(active);
        target.innerHTML = `<div class="card empty">加载中...</div>`;
        try {
          if (active === "dashboard") await renderDashboard();
          if (active === "portfolio") await renderPortfolio();
          if (active === "signals") await renderSignals();
          if (active === "risk") await renderRisk();
          if (active === "watchlist") await renderWatchlist();
          if (active === "manual") renderManual();
        } catch (error) {
          target.innerHTML = `<div class="card empty bad">加载失败：${error.message}</div>`;
        }
      }

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        const button = document.getElementById("refreshBtn");
        button.textContent = "刷新中...";
        button.disabled = true;
        try {
          await api("/data/refresh", { method: "POST" });
          await render();
        } finally {
          button.textContent = "刷新市场数据";
          button.disabled = false;
        }
      });

      renderNav();
    </script>
  </body>
</html>
